name: SDLC — Auto-Label PRs

on:
  pull_request_target:
    types: [opened, ready_for_review, edited, synchronize]

permissions:
  contents: read
  issues: read
  pull-requests: write

jobs:
  auto-label:
    name: Apply SDLC Stage Label
    runs-on: ubuntu-latest
    steps:
      - name: Detect linked SDLC issue and apply label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BODY: ${{ github.event.pull_request.body }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          echo "🔍 Checking PR #${PR_NUMBER} for SDLC issue links..."

          # Stage number → completion label mapping
          declare -A STAGE_LABELS
          STAGE_LABELS["1"]="sdlc:requirements-complete"
          STAGE_LABELS["2"]="sdlc:design-complete"
          STAGE_LABELS["3"]="sdlc:backlog-complete"
          STAGE_LABELS["3.5"]="sdlc:build-plan"  # Automated by sdlc-build-planner.yml (label still valid for the workflow-created PR)
          STAGE_LABELS["4"]="sdlc:wave"           # Develop agent — wave implementation PRs
          STAGE_LABELS["5"]="sdlc:wave"           # UI develop agent — wave implementation PRs
          STAGE_LABELS["6"]="sdlc:tests-complete"
          STAGE_LABELS["7"]="sdlc:security-complete"

          MATCHED_LABEL=""

          # --- Method 1: GraphQL closingIssuesReferences ---
          echo "  ➤ Method 1: Checking closingIssuesReferences via GraphQL..."
          LINKED_ISSUES=$(gh api graphql -f query='
            query($owner: String!, $repo: String!, $pr: Int!) {
              repository(owner: $owner, name: $repo) {
                pullRequest(number: $pr) {
                  closingIssuesReferences(first: 10) {
                    nodes {
                      number
                      title
                      labels(first: 10) {
                        nodes { name }
                      }
                    }
                  }
                }
              }
            }' -f owner="${REPO%%/*}" -f repo="${REPO##*/}" -F pr="$PR_NUMBER" \
            --jq '.data.repository.pullRequest.closingIssuesReferences.nodes[]' 2>/dev/null || echo "")

          if [ -n "$LINKED_ISSUES" ]; then
            while IFS= read -r issue_json; do
              IS_SDLC=$(echo "$issue_json" | jq -r '.labels.nodes[].name' 2>/dev/null | grep -c "sdlc:pipeline" || true)
              if [ "$IS_SDLC" -gt 0 ]; then
                TITLE=$(echo "$issue_json" | jq -r '.title')
                NUM=$(echo "$issue_json" | jq -r '.number')
                echo "    ✅ Found linked SDLC issue #${NUM}: ${TITLE}"
                STAGE=$(echo "$TITLE" | grep -oP '\[SDLC Agent \K[0-9.]+' || true)
                if [ -n "$STAGE" ] && [ -n "${STAGE_LABELS[$STAGE]+x}" ]; then
                  MATCHED_LABEL="${STAGE_LABELS[$STAGE]}"
                  echo "    📌 Stage ${STAGE} → label: ${MATCHED_LABEL}"
                  break
                fi
              fi
            done <<< "$(echo "$LINKED_ISSUES" | jq -c '.' 2>/dev/null)"
          fi

          # --- Method 2: Parse PR body for issue references ---
          if [ -z "$MATCHED_LABEL" ]; then
            echo "  ➤ Method 2: Parsing PR body for #N issue references..."
            ISSUE_REFS=$(echo "$PR_BODY" | grep -oP '#\K[0-9]+' | sort -u || true)
            for ISSUE_NUM in $ISSUE_REFS; do
              ISSUE_DATA=$(gh api "repos/${REPO}/issues/${ISSUE_NUM}" --jq '{title: .title, labels: [.labels[].name]}' 2>/dev/null || echo "")
              if [ -n "$ISSUE_DATA" ]; then
                IS_SDLC=$(echo "$ISSUE_DATA" | jq -r '.labels[]' 2>/dev/null | grep -c "sdlc:pipeline" || true)
                if [ "$IS_SDLC" -gt 0 ]; then
                  TITLE=$(echo "$ISSUE_DATA" | jq -r '.title')
                  echo "    ✅ Found referenced SDLC issue #${ISSUE_NUM}: ${TITLE}"
                  STAGE=$(echo "$TITLE" | grep -oP '\[SDLC Agent \K[0-9.]+' || true)
                  if [ -n "$STAGE" ] && [ -n "${STAGE_LABELS[$STAGE]+x}" ]; then
                    MATCHED_LABEL="${STAGE_LABELS[$STAGE]}"
                    echo "    📌 Stage ${STAGE} → label: ${MATCHED_LABEL}"
                    break
                  fi
                fi
              fi
            done
          fi

          # --- Method 3: Find open SDLC issues assigned to PR author ---
          if [ -z "$MATCHED_LABEL" ]; then
            echo "  ➤ Method 3: Searching open SDLC issues assigned to PR author..."
            PR_AUTHOR=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" --jq '.user.login' 2>/dev/null || echo "")
            if [ -n "$PR_AUTHOR" ]; then
              SDLC_ISSUES=$(gh api "repos/${REPO}/issues?labels=sdlc:pipeline&state=open&assignee=${PR_AUTHOR}&per_page=10" 2>/dev/null || echo "[]")
              ISSUE_COUNT=$(echo "$SDLC_ISSUES" | jq 'length' 2>/dev/null || echo "0")
              if [ "$ISSUE_COUNT" -gt 0 ]; then
                # Use the most recently created matching issue
                ISSUE_DATA=$(echo "$SDLC_ISSUES" | jq -r '.[0]')
                TITLE=$(echo "$ISSUE_DATA" | jq -r '.title')
                NUM=$(echo "$ISSUE_DATA" | jq -r '.number')
                echo "    ✅ Found SDLC issue #${NUM} assigned to ${PR_AUTHOR}: ${TITLE}"
                STAGE=$(echo "$TITLE" | grep -oP '\[SDLC Agent \K[0-9.]+' || true)
                if [ -n "$STAGE" ] && [ -n "${STAGE_LABELS[$STAGE]+x}" ]; then
                  MATCHED_LABEL="${STAGE_LABELS[$STAGE]}"
                  echo "    📌 Stage ${STAGE} → label: ${MATCHED_LABEL}"
                fi
              fi
            fi
          fi

          # --- Method 4: Detect wave PRs by title or branch pattern ---
          if [ -z "$MATCHED_LABEL" ]; then
            echo "  ➤ Method 4: Checking PR title/branch for wave patterns..."
            PR_TITLE="${{ github.event.pull_request.title }}"
            PR_BRANCH="${{ github.event.pull_request.head.ref }}"

            if echo "$PR_TITLE" | grep -qiP '^\[Wave \d+\]'; then
              echo "    ✅ PR title matches wave pattern: ${PR_TITLE}"
              MATCHED_LABEL="sdlc:wave"
              echo "    📌 Wave PR detected → label: ${MATCHED_LABEL}"
            elif echo "$PR_BRANCH" | grep -qP '^wave-\d+/'; then
              echo "    ✅ PR branch matches wave pattern: ${PR_BRANCH}"
              MATCHED_LABEL="sdlc:wave"
              echo "    📌 Wave branch detected → label: ${MATCHED_LABEL}"
            fi
          fi

          # --- Apply the label ---
          if [ -n "$MATCHED_LABEL" ]; then
            echo ""
            echo "🏷️ Applying label '${MATCHED_LABEL}' to PR #${PR_NUMBER}..."
            gh api "repos/${REPO}/issues/${PR_NUMBER}/labels" \
              -f "labels[]=${MATCHED_LABEL}" \
              --jq '.[].name' || echo "⚠️ Failed to apply label"

            # Also ensure sdlc:pipeline label is present
            gh api "repos/${REPO}/issues/${PR_NUMBER}/labels" \
              -f "labels[]=sdlc:pipeline" \
              --jq '.[].name' 2>/dev/null || true

            echo "✅ Labels applied successfully"
          else
            echo ""
            echo "ℹ️ No SDLC issue link detected — skipping label application"
          fi
